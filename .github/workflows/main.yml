name: Daily Events Generator
on:
  schedule:
    - cron: '0 7 * * *'
  workflow_dispatch:

jobs:
  generate-events:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install requests firebase-admin google-generativeai
      - name: List files
        run: ls -la
      - name: Run script
        run: python generate_events.py
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          FIREBASE_CREDENTIALS: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
